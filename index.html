<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KACEM's Collection - New Arrivals</title>
    <style>
        /* إعدادات عامة لتنظيف الأنماط الافتراضية للخطوط والهوامش */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* تنسيق قائمة التنقل */
        header {
            background-color: #fff;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            letter-spacing: 1px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            margin-left: 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
        }

        nav a:hover {
            color:black  #cc0000; /* لون أحمر لتأثير المرور */
        }

        /* تنسيق قسم المنتجات الرئيسي */
        .product-section {
            margin-top: 100px; /* لإعطاء مساحة تحت قائمة التنقل الثابتة */
            padding: 50px;
            background-color: #f9f9f9;
        }

        .product-section h2 {
            text-align: center;
            margin-bottom: 50px;
            font-size: 28px;
            color: #333;
        }

        /* تنسيق شبكة المنتجات */
        .product-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap; /* لجعل المنتجات تتجاوب مع الشاشات الصغيرة */
        }

        /* تنسيق بطاقة المنتج الفردية */
        .product-card {
            background-color: #fff;
            width: 10%; /* عرض ثلاث منتجات في الصف */
            min-width: 250px; /* لمنع البطاقات من أن تصبح صغيرة جدًا */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px); /* تأثير الارتفاع عند المرور */
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        /* تنسيق صورة المنتج */
        .product-image {https://pin.it/4B3Z16rJv
            width: 100%;
            height: 300px; /* ارتفاع ثابت لتوحيد البطاقات */
            object-fit: contain; /* للحفاظ على نسبة الصورة دون تشويه */
            display: block;
            margin-bottom: 10px;
        }

        /* تنسيق تفاصيل المنتج */
        .product-details {
            padding: 20px;
            text-align: center;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* تنسيق زر الإضافة إلى السلة */
        .add-to-cart-btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background-color: #cc0000;
        }

        /* تنسيق التذيل */
        footer {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Brand</h1>
        <nav>
            <a href="#">New In</a>
            <a href="#">Clothing</a>
            <a href="#">Footwear</a>
            <a href="#">Accessories</a>
        </nav>
    </header>

    <main class="product-section">
        <h2>Our Curated Picks</h2>
        
        <div class="product-grid">
            
            <div class="product-card">
                <img src="image_0.png" alt="Moncler Signature Stripe Tracksuit" class="product-image">
                <div class="product-details">
                    <h3 class="product-title">Moncler Stripe Tracksuit Set</h3>
                    <p class="product-price">€1,350</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="image_1.png" alt="Brunello Cucinelli Suede Sandals" class="product-image">
                <div class="product-details">
                    <h3 class="product-title">Brunello Cucinelli Suede Sandals</h3>
                    <p class="product-price">€890</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="image_2.png" alt="Boss Black Logo Polo Shirt" class="product-image">
                <div class="product-details">
                    <h3 class="product-title">Boss Black Logo Polo</h3>
                    <p class="product-price">€160</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2023 My Brand. All Rights Reserved.</p>
    </footer>

</body>
</html>
