<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fashion Brand</title>
    <style>
        /* إعدادات عامة لتنظيف الخطوط والمسافات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* تصميم القائمة العلوية */
        header {
            background-color: #ffffff;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eeeeee;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #004526;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            margin-left: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        nav a:hover {
            color: #004526;
        }

        /* تصميم الصورة الكبيرة (البانر) */
        .hero {
            background-color: #f4f4f4;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* أضفنا صورة خلفية للبانر الرئيسي */
            background-image: url('https://placehold.co/1200x400/eeeeee/333333?text=Spring+Collection+2026');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 40px;
            color: #111;
            margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
        }

        .hero button {
            padding: 12px 30px;
            background-color: #004526;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .hero button:hover {
            background-color: #00331c;
        }

        /* تصميم قسم المنتجات */
        .products-section {
            padding: 50px;
            text-align: center;
        }

        .products-section h2 {
            margin-bottom: 40px;
            font-size: 28px;
            color: #333;
        }

        .product-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap; /* للسماح بنزول المنتجات لسطر جديد */
        }

        .product-card {
            width: 30%;
            min-width: 250px; /* لضمان عدم صغر البطاقة جداً في الشاشات الصغيرة */
            border: 1px solid #eee;
            padding: 20px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .product-card:hover {
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        /* تحديث تصميم الصورة لتأخذ حجم البطاقة بشكل احترافي */
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover; /* يمنع تمطط الصورة أو تشوهها */
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .product-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }

        .product-price {
            color: #004526;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyBrand</div>
        <nav>
            <a href="#">New In</a>
            <a href="#">Clothing</a>
            <a href="#">Footwear</a>
            <a href="#">Accessories</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Spring / Summer 2026 Collection</h1>
        <button>Shop Now</button>
    </section>

    <section class="products-section">
        <h2>Trending Now</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="https://placehold.co/400x400/f9f9f9/004526?text=Moncler+Tracksuit" alt="Moncler Tracksuit" class="product-image">
                <div class="product-title">Moncler Sport Tracksuit</div>
                <div class="product-price">850 €</div>
            </div>

            <div class="product-card">
                <img src="https://placehold.co/400x400/f9f9f9/004526?text=Hugo+Boss+Polo" alt="Hugo Boss Polo" class="product-image">
                <div class="product-title">Hugo Boss Classic Polo</div>
                <div class="product-price">120 €</div>
            </div>

            <div class="product-card">
                <img src="https://placehold.co/400x400/f9f9f9/004526?text=Brunello+Cucinelli+Slides" alt="Brunello Cucinelli Slides" class="product-image">
                <div class="product-title">Brunello Cucinelli Slides</div>
                <div class="product-price">350 €</div>
            </div>

        </div>
    </section>

</body>
</html>
