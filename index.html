<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Nouveau Site</title>
    <style>
        /* Design rapide et moderne */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #0070f3; }
        p { line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0070f3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #0051b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>صحا حدي صحا واش خاصك حبيبي !</h1>
        <p>Ceci est un site web propulsé par <strong>GitHub</strong> et hébergé sur <strong>Vercel</strong>.</p>
        <p>Le développement commence ici.</p>
        <a href="#" class="btn">En savoir plus</a>
    </div>

</body>
</html>
