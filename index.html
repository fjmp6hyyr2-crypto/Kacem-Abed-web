<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fashion Brand</title>
    <style>
        /* إعدادات عامة لتنظيف الخطوط والمسافات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* تصميم القائمة العلوية */
        header {
            background-color: #ffffff;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eeeeee;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #004526; /* لون أخضر داكن قريب من ستايل لاكوست */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            margin-left: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        nav a:hover {
            color: #004526;
        }

        /* تصميم الصورة الكبيرة (البانر) */
        .hero {
            background-color: #f4f4f4;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 40px;
            color: #333;
            margin-bottom: 15px;
        }

        .hero button {
            padding: 12px 30px;
            background-color: #004526;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .hero button:hover {
            background-color: #00331c;
        }

        /* تصميم قسم المنتجات */
        .products-section {
            padding: 50px;
            text-align: center;
        }

        .products-section h2 {
            margin-bottom: 40px;
            font-size: 28px;
            color: #333;
        }

        .product-grid {
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .product-card {
            width: 30%;
            border: 1px solid #eee;
            padding: 20px;
            transition: 0.3s;
        }

        .product-card:hover {
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        .product-image {
            background-color: #f9f9f9;
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
        }

        .product-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }

        .product-price {
            color: #004526;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyBrand</div>
        <nav>
            <a href="#">New In</a>
            <a href="#">Clothing</a>
            <a href="#">Footwear</a>
            <a href="#">Accessories</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Spring / Summer 2026 Collection</h1>
        <p style="margin-bottom: 20px;">Discover the new elegance.</p>
        <button>Shop Now</button>
    </section>

    <section class="products-section">
        <h2>Trending Now</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">Image: Classic Polo</div>
                <div class="product-title">Classic Cotton Polo</div>
                <div class="product-price">120 €</div>
            </div>
            <div class="product-card">
                <div class="product-image">Image: Tracksuit</div>
                <div class="product-title">Sport Edition Tracksuit</div>
                <div class="product-price">250 €</div>
            </div>
            <div class="product-card">
                <div class="product-image">Image: Slides</div>
                <div class="product-title">Summer Slides</div>
                <div class="product-price">60 €</div>
            </div>
        </div>
    </section>

</body>
</html>
